<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AI Problem Solver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <div class="title">Problem Solver</div>
          <div class="subtitle" id="platformLabel">Detecting platform…</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="newBtn" class="icon-btn hidden" title="Start a new session (clears saved solution)">New</button>
        <button id="optionsBtn" class="icon-btn" title="Settings">⚙</button>
      </div>
    </header>

    <section class="controls">
      <label class="field">
        <span>Language</span>
        <select id="language">
          <option>Python</option>
          <option>C++</option>
          <option>Java</option>
          <option>JavaScript</option>
          <option>TypeScript</option>
          <option>Go</option>
          <option>C#</option>
          <option>Rust</option>
          <option>Kotlin</option>
        </select>
      </label>
      <button id="solveBtn" class="primary">Read problem &amp; solve</button>
    </section>

    <section id="problemPreview" class="preview hidden">
      <div class="preview-title" id="problemTitle"></div>
      <div class="preview-body" id="problemBody"></div>
    </section>

    <section id="status" class="status hidden"></section>

    <section id="solution" class="solution hidden">
      <div class="solution-actions">
        <button id="copyBtn" class="ghost">Copy code</button>
        <button id="copyAllBtn" class="ghost">Copy all</button>
        <button id="fixToggleBtn" class="ghost">Fix / Improve</button>
      </div>
      <div id="solutionBody" class="solution-body"></div>

      <div id="fixPanel" class="fix-panel hidden">
        <label class="fix-label" for="fixError">
          Paste the error, failing test case, or what went wrong:
        </label>
        <textarea
          id="fixError"
          rows="5"
          placeholder="e.g. Wrong Answer on test 37: expected [1,2,3], got [1,2]. Or paste the compile/runtime error here. Leave blank to just ask for a review & fix."
        ></textarea>
        <div class="fix-actions">
          <button id="fixCancelBtn" class="ghost">Cancel</button>
          <button id="fixSubmitBtn" class="primary small">Regenerate with fix</button>
        </div>
      </div>
    </section>

    <footer class="foot">
      <span id="modelLabel">Model: —</span>
      <a href="#" id="openOptions">Settings</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
